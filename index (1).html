<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Moedas | BRL ⇄ USD ⇄ EUR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="card">
    <header class="card__header">
      <h1>Conversor de Moedas</h1>
      <p class="subtitle">Real, Dólar e Euro — conversão rápida e simples</p>
    </header>

    <section class="converter">
      <div class="field">
        <label for="amount">Valor</label>
        <input type="number" id="amount" placeholder="0,00" min="0" step="0.01" value="1" />
      </div>

      <div class="field">
        <label for="from">De</label>
        <select id="from">
          <option value="BRL">BRL — Real</option>
          <option value="USD">USD — Dólar</option>
          <option value="EUR">EUR — Euro</option>
        </select>
      </div>

      <button id="swap" title="Inverter moedas" aria-label="Inverter moedas">⇄</button>

      <div class="field">
        <label for="to">Para</label>
        <select id="to">
          <option value="USD">USD — Dólar</option>
          <option value="BRL">BRL — Real</option>
          <option value="EUR">EUR — Euro</option>
        </select>
      </div>
    </section>

    <section class="result">
      <span id="resultValue">—</span>
      <p id="rateInfo" class="rate-info"></p>
    </section>

    <footer class="card__footer">
      <p>Taxas de referência fixas no código. Próximo passo: integrar a uma API de câmbio em tempo real.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
